services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.compose
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
    volumes:
      # Mount source for live reload in Flask debug mode
      - ./backend:/app
      - /app/__pycache__

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # Vite proxy uses this to reach the backend over Docker's internal network
      BACKEND_HOST: "http://backend:5000"
    volumes:
      # Mount src and public for Vite HMR; keep node_modules from the image
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
